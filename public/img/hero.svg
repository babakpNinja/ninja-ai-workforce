<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" font-family="Overpass, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f8ff"/><stop offset="1" stop-color="#e7eeff"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a6bff"/><stop offset="1" stop-color="#6e6bff"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7aa6ff" stop-opacity="0.55"/><stop offset="1" stop-color="#7aa6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#b9a6ff" stop-opacity="0.5"/><stop offset="1" stop-color="#b9a6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g-res" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f8cff"/><stop offset="1" stop-color="#2f6bff"/></linearGradient>
    <linearGradient id="g-bld" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8f7bff"/><stop offset="1" stop-color="#6e6bff"/></linearGradient>
    <linearGradient id="g-ops" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#36c6e0"/><stop offset="1" stop-color="#1aa6c8"/></linearGradient>
    <linearGradient id="g-ana" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34d39e"/><stop offset="1" stop-color="#16b886"/></linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#16306e" flood-opacity="0.16"/></filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="26"/></filter>
  </defs>

  <rect x="0" y="0" width="680" height="560" rx="28" fill="url(#bg)"/>
  <!-- depth blobs -->
  <circle cx="150" cy="130" r="150" fill="url(#blob1)" filter="url(#blur)"/>
  <circle cx="560" cy="430" r="160" fill="url(#blob2)" filter="url(#blur)"/>

  <!-- connection lines -->
  <g stroke="url(#core)" stroke-width="2.2" stroke-opacity="0.32">
    <line x1="340" y1="290" x2="168" y2="150"/>
    <line x1="340" y1="290" x2="520" y2="158"/>
    <line x1="340" y1="290" x2="150" y2="430"/>
    <line x1="340" y1="290" x2="528" y2="424"/>
  </g>
  <g fill="#2f6bff">
    <circle cx="254" cy="220" r="3"/><circle cx="430" cy="224" r="3"/><circle cx="245" cy="360" r="3"/><circle cx="434" cy="357" r="3"/>
  </g>

  <!-- AI employee nodes -->
  <g filter="url(#soft)" font-size="26" text-anchor="middle">
    <g><circle cx="168" cy="150" r="40" fill="url(#g-res)"/><text x="168" y="160" fill="#fff">🔎</text></g>
    <g><circle cx="520" cy="158" r="40" fill="url(#g-bld)"/><text x="520" y="168" fill="#fff">🛠️</text></g>
    <g><circle cx="150" cy="430" r="40" fill="url(#g-ops)"/><text x="150" y="440" fill="#fff">⚙️</text></g>
    <g><circle cx="528" cy="424" r="40" fill="url(#g-ana)"/><text x="528" y="434" fill="#fff">📈</text></g>
  </g>

  <!-- glow ring + core -->
  <circle cx="340" cy="290" r="92" fill="#2f6bff" opacity="0.12" filter="url(#glow)"/>
  <g filter="url(#soft)">
    <circle cx="340" cy="290" r="76" fill="url(#core)"/>
    <circle cx="340" cy="290" r="76" fill="none" stroke="#fff" stroke-opacity="0.25" stroke-width="2"/>
    <text x="340" y="282" font-size="42" font-weight="800" fill="#fff" text-anchor="middle">◈</text>
    <text x="340" y="312" font-size="14.5" font-weight="700" fill="#dbe6ff" text-anchor="middle" letter-spacing="0.5">AI workforce</text>
  </g>

  <!-- floating glass deliverable cards -->
  <g filter="url(#soft)">
    <rect x="392" y="70" width="214" height="64" rx="16" fill="#ffffff" fill-opacity="0.92" stroke="#dfe7fb"/>
    <circle cx="420" cy="102" r="16" fill="#eaf1ff"/><text x="420" y="108" font-size="16" text-anchor="middle">📊</text>
    <text x="446" y="97" font-size="14.5" font-weight="700" fill="#16306e">Q3 board deck</text>
    <text x="446" y="116" font-size="12.5" fill="#5f7196">shipped · 11 slides ✓</text>
  </g>
  <g filter="url(#soft)">
    <rect x="74" y="290" width="214" height="64" rx="16" fill="#ffffff" fill-opacity="0.92" stroke="#dfe7fb"/>
    <circle cx="102" cy="322" r="16" fill="#eafff6"/><text x="102" y="328" font-size="16" text-anchor="middle">🚀</text>
    <text x="128" y="317" font-size="14.5" font-weight="700" fill="#16306e">App deployed</text>
    <text x="128" y="336" font-size="12.5" fill="#5f7196">live URL sent → #eng</text>
  </g>
  <g filter="url(#soft)">
    <rect x="406" y="470" width="206" height="60" rx="16" fill="#ffffff" fill-opacity="0.92" stroke="#dfe7fb"/>
    <circle cx="433" cy="500" r="15" fill="#f0edff"/><text x="433" y="506" font-size="15" text-anchor="middle">🔌</text>
    <text x="458" y="495" font-size="14" font-weight="700" fill="#16306e">3,000+ tools</text>
    <text x="458" y="513" font-size="12.5" fill="#5f7196">one-click connected</text>
  </g>
</svg>
